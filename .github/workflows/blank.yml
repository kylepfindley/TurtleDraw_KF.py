def main():
    # Requirement 1: Set up Turtle window and turtle
    screen = turtle.Screen()
    screen.setup(450, 450)
    screen.title("TurtleDraw_kf")
    
    t = turtle.Turtle()
    t.speed(0)  # Maximum speed
    
    # Requirement 2: Ask for input file and read it
    filename = input("Enter input file name: ")
    
    total_distance = 0.0
    prev_x = None
    prev_y = None
    first_point = True
    
    try:
        with open(filename, 'r') as f:
            for line in f:
                line = line.strip()
                if not line:
                    continue
                
                parts = line.split()
                
                # Requirement 3: Handle drawing commands
                if parts[0] == 'stop':
                    t.penup()
                else:
                    color = parts[0]
                    x = int(parts[1])
                    y = int(parts[2])
                    
                    t.pencolor(color)
                    
                    if first_point:
                        # Move to first point without drawing
                        t.penup()
                        t.goto(x, y)
                        t.pendown()
                        first_point = False
                    else:
                        # Calculate distance for connected points
                        if prev_x is not None:
                            distance = math.sqrt((x - prev_x)**2 + (y - prev_y)**2)
                            total_distance += distance
                        t.goto(x, y)
                    
                    prev_x = x
                    prev_y = y
                    
    except FileNotFoundError:
        print(f"Error: File '{filename}' not found.")
        return
    except ValueError as e:
        print(f"Error parsing file: {e}")
        return
    
    # Requirement 4: Print total distance and clean up
    t.penup()
    t.goto(180, -200)  # Bottom right area
    t.write(f"Total distance: {total_distance:.2f}", align="right", font=("Arial", 12, "normal"))
    
    input("Press enter to exit")
    screen.bye()

if __name__ == "__main__":
    main()
